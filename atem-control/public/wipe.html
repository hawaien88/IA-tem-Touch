<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réglages Wipe</title>
  <meta name="viewport" content="width=1280, height=800">
  <style>
    body {
  margin: 0;
  background: #111;
  background-image: url("/images/background_global_iatem.png");
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover; /* ou 'contain' si tu veux que l'image soit totalement visible */
  background-position: center;
  font-family: sans-serif;
  color: #fff;
  overflow: auto;
  width: 1280px;
  height: 800px;
}

		 
    body::-webkit-scrollbar {
      width: 0px;                    /* Chrome/Safari/Edge */
      height: 0px;
    }
	  


    .back-button {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #444;
      padding: 10px 16px;
      font-size: 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    h1 {
      text-align: center;
      margin-top: 60px;
      font-size: 42px;
    }

    .grid-container {
      width: 800px;
      height: 300px;
      margin: 30px auto 20px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
    }

    .grid-btn {
      background: #1a1a1a;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .grid-btn img {
      max-width: 100%;
      max-height: 100%;
    }

    .grid-btn.active-shape {
      border: 3px solid yellow;
      box-shadow: 0 0 10px yellow;
    }

    .controls {
      width: 900px;
      margin: 10px auto;
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
    }

    .control-group {
      background: #222;
      border-radius: 8px;
      padding: 10px 16px;
      width: 260px;
    }

    .control-group h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-container input[type="range"] {
      flex: 1;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      background: #333;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .value-display {
      margin-top: 6px;
      font-size: 16px;
      text-align: center;
    }

    select {
      width: 100%;
      padding: 6px;
      font-size: 16px;
      background: #333;
      color: white;
      border-radius: 4px;
      border: none;
    }

    .group-wrapper {
      border: 2px solid #444;
      padding: 50px 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .labeled-border {
      position: relative;
      padding-top: 70px;
	  margin-bottom: 50px;
    }

    .labeled-border .group-title {
      position: absolute;
      top: 0px;
      left: 20px;
      background: #111;
      padding: 8px;
      font-size: 20px;
      font-weight: bold;
    }

    .pos-group {
      display: flex;
      gap: 20px;
      margin-top: 15px;
    }

    .adoucissement-largeur {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

<!--    .direction {
      width: 575px;
      margin-top: 20px;
      margin-bottom: 20px;
    } -->

    .fill {
      width: 94.7%;
    }

<!-- .direction .btn-group,
    .direction label {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    } -->

    .direction-group {
      width: 575px;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .direction-group .btn-group,
    .direction-group label {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }




    .direction label {
      margin-bottom: 6px;
    }

    .disabled-control {
      opacity: 0.4;
      pointer-events: none;
    }
	
	button.active-direction {
  border: 2px solid yellow;
  box-shadow: 0 0 8px yellow;
}
    .duration {
      width: 575px;
      margin-top: 20px;
      margin-bottom: 20px;
    }
	
	.selectme {
  margin: 0 auto 1em auto;
  width: 800px;
  display: flex;
  flex-direction: column;
  align-items: center;  /* centre horizontalement */
  gap: 0.4em; /* espace entre label et select */
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: #1a1a1a;
  box-shadow: 0 4px 8px rgba(0,0,0,0.6);
  z-index: 1000;
}

.transition-buttons {
  display: flex;
  gap: 8px;
  flex: 1;
  justify-content: center;
}

.transition-button {
  background: linear-gradient(to bottom, #2e2e2e, #1a1a1a);
  border-radius: 8px;
  padding: 10px 14px;
  color: white;
  text-align: center;
  box-shadow:
    inset 0 2px 2px rgba(255,255,255,0.05),
    0 4px 8px rgba(0,0,0,0.8);
  font-size: 16px;
  transition: transform 0.1s;
  cursor: pointer;
  border: none;
  min-width: 70px;
}

.transition-button:active {
  background: linear-gradient(to bottom, #1a1a1a, #2e2e2e);
  transform: scale(0.97);
}

.active-transition {
  outline: 3px solid yellow;
  box-shadow: 0 0 10px yellow;
  transition: all 0.2s ease-in-out;
}

.blink-transition {
  outline: 3px solid yellow;
  box-shadow: 0 0 10px yellow;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%   { outline-color: yellow; box-shadow: 0 0 10px yellow; }
  50%  { outline-color: transparent; box-shadow: none; }
  100% { outline-color: yellow; box-shadow: 0 0 10px yellow; }
}
	
  </style>
</head>
<body>
  <div class="top-bar">
  <button class="back-button" onclick="window.location.href='index.html'">← Accueil</button>

  <div class="transition-buttons">
    <button class="transition-button">MIX</button>
    <button class="transition-button">DIP</button>
    <button class="transition-button">WIPE</button>
    <button class="transition-button">STING</button>
    <button class="transition-button">DVE</button>
  </div>

  <div class="me-select-container">
    <label for="meSelect">ME :</label>
    <select id="meSelect">
      <option value="0">ME 1</option>
      <option value="1">ME 2</option>
    </select>
  </div>
</div>

<h1>Réglages Wipe</h1>


  <div class="grid-container" id="shapeGrid"></div>


 <div class="controls">
<div class="group-wrapper">
  <!-- Durée -->
  <div class="control-group duration">
    <h3>Durée</h3>
    <div class="slider-container">
      <button onclick="adjust('duration', -0.02)">–</button>
      <input type="range" min="0.01" max="500" step="0.01" id="durationSlider" oninput="updateDisplay('duration') ; sendToAtem('duration', this.value);">
      <button onclick="adjust('duration', 0.02)">+</button>
    </div>
    <div class="value-display" id="durationDisplay">Durée : 00:01</div>
  </div>
</div>
  <!-- Bloc symétrie + positions -->
  <div class="group-wrapper">
    <div class="control-group symmetry">
      <h3>Symétrie</h3>
      <div class="slider-container">
        <button onclick="adjust('symmetry', -10)">–</button>
        <input type="range" id="symmetrySlider" min="0" max="10000" step="10" oninput="updateDisplay('symmetry'); sendToAtem('symmetry', this.value);">
        <button onclick="adjust('symmetry', 10)">+</button>
      </div>
      <div class="value-display" id="symmetryDisplay">Symétrie : 0%</div>
    </div>

    <div class="pos-group">
      <div class="control-group posX">
        <h3>Position X</h3>
        <div class="slider-container">
          <button onclick="adjust('posX', -10)">–</button>
          <input type="range" id="posXSlider" min="0" max="10000" step="10" oninput="updateDisplay('posX'); sendToAtem('posX', this.value);">
		  <button onclick="adjust('posX', 10)">+</button>
        </div>
        <div class="value-display" id="posXDisplay">X : 0.0000</div>
      </div>

      <div class="control-group posY">
        <h3>Position Y</h3>
        <div class="slider-container">
          <button onclick="adjust('posY', -10)">–</button>
          <input type="range" id="posYSlider" min="0" max="10000" step="10" oninput="updateDisplay('posY'); sendToAtem('posY', this.value);">
          <button onclick="adjust('posY', 10)">+</button>
        </div>
        <div class="value-display" id="posYDisplay">Y : 0.0000</div>
      </div>
    </div>
  </div>
<div class="group-wrapper">
  <!-- Direction -->
<div class="control-group direction direction-group">
  <h3>Direction</h3>
  <div class="btn-group">
    <button id="playBtn">▶ Play</button>
    <button id="reverseBtn">◀ Retour</button>
  </div>
  <label for="inverseCheckbox">
    <input type="checkbox" id="inverseCheckbox"> Inverser
  </label>
</div>
 </div>

  <!-- Bloc bordure -->
  <div class="group-wrapper labeled-border">
    <h3 class="group-title">Bordure</h3>
    <div class="adoucissement-largeur">
      <div class="control-group softness">
        <h3>Adoucissement</h3>
        <div class="slider-container">
          <button onclick="adjust('softness', -10)">–</button>
          <input type="range" id="softnessSlider" min="0" max="10000" step="0.1" oninput="updateDisplay('softness'); sendToAtem('softness', this.value); ">
          <button onclick="adjust('softness', 10)">+</button>
        </div>
        <div class="value-display" id="softnessDisplay">Adoucissement : 0%</div>
      </div>

      <div class="control-group width">
        <h3>Largeur</h3>
        <div class="slider-container">
          <button onclick="adjust('width', -10)">–</button>
          <input type="range" id="widthSlider" min="0" max="10000" step="0.1" oninput="updateDisplay('width'); sendToAtem('width', this.value); ">
          <button onclick="adjust('width', 10)">+</button>
        </div>
        <div class="value-display" id="widthDisplay">Largeur : 0%</div>
      </div>
    </div>

    <div class="control-group fill">
      <h3>Remplissage</h3>
      <select id="fillSelect" onchange="setFill(this)"></select>
    </div>
  </div>

</div>


<script>
  // Valeur par défaut
  let FPS = 60;

  function loadFrameRate() {
    return fetch('/getVideoSettings')
      .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
      .then(data => {
        if (data.fps != null) {
          FPS = data.fps;
          const maxDurationSec = 250 / FPS;
          document.getElementById('durationSlider').max = maxDurationSec.toFixed(2);
        }
      })
      .catch(err => console.warn('⚠️ FPS ATEM non récupéré', err));
  }

  function getME() {
    const sel = document.getElementById('meSelect');
    return sel ? parseInt(sel.value, 10) : 0;
  }

  const endpoints = {
    pattern:   v => `/setWipePattern?pattern=${v}&me=${getME()}`,
    duration:  v => `/setWipeDuration?value=${v}&me=${getME()}`,
    symmetry:  v => `/setWipeSymmetry?value=${v}&me=${getME()}`,
    posX:      v => `/setWipePosX?value=${v}&me=${getME()}`,
    posY:      v => `/setWipePosY?value=${v}&me=${getME()}`,
    softness:  v => `/setWipeSoftness?value=${v}&me=${getME()}`,
    width:     v => `/setWipeWidth?value=${v}&me=${getME()}`,
    direction: v => `/setWipeDirection?value=${v}&me=${getME()}`,
    inverse:   v => `/setWipeInverse?value=${v}&me=${getME()}`,
    fill:      v => `/setWipeFill?source=${v}&me=${getME()}`
  };

  function sendToAtem(type, value) {
    let sendVal = value;
    if (type === 'duration') {
      sendVal = Math.round((value) * FPS);
      sendVal = Math.max(0, Math.min(255, sendVal));
    }
    const builder = endpoints[type];
    if (!builder) return;
    return fetch(builder(sendVal)).catch(err => console.error(`❌ Erreur ${type} → ATEM`, err));
  }

  function adjust(type, delta) {
    const slider = document.getElementById(type + 'Slider');
    if (!slider) return;
    let v = parseFloat(slider.value) + delta;
    v = Math.max(parseFloat(slider.min), Math.min(parseFloat(slider.max), v));
    if (type === 'posX' || type === 'posY') {
      v = parseFloat(v.toFixed(4));
    }
    slider.value = v;
    updateDisplay(type);
    sendToAtem(type, v);
  }

  function updateDisplay(type) {
    const v = parseFloat(document.getElementById(type + 'Slider').value);
    const d = document.getElementById(type + 'Display');
    switch(type) {
      case 'symmetry': d.textContent = `Symétrie : ${(v/100).toFixed(1)}%`; break;
      case 'softness': d.textContent = `Adoucissement : ${(v/100).toFixed(1)}%`; break;
      case 'width':    d.textContent = `Largeur : ${(v/100).toFixed(1)}%`; break;
      case 'posX':     d.textContent = `X : ${(v / 10000).toFixed(4)}`; break;
      case 'posY':     d.textContent = `Y : ${(v / 10000).toFixed(4)}`; break;
      case 'duration':
        const totalFrames = Math.round(v * 2 * FPS);
        const seconds = Math.floor(totalFrames / FPS);
        const halfFrames = Math.round((totalFrames % FPS) / 2);
        d.textContent = `Durée : ${seconds}:${halfFrames.toString().padStart(2, '0')}`;
        break;
    }
  }

  function highlightShape(id) {
    document.querySelectorAll('.grid-btn').forEach((btn, idx) =>
      btn.classList.toggle('active-shape', idx + 1 === id)
    );
  }

  function setAvailableControls(shapeId) {
    const wipeCapabilities = {
/*      1:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      2:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      3:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      4:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      5:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      6:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      7:  ['duration','symmetry','softness','width','direction','inverse','fill'],
      8:  ['duration','symmetry','softness','width','direction','inverse','fill'],
      9:  ['duration','symmetry','softness','width','direction','inverse','fill'],
      10: ['duration','symmetry','softness','width','direction','inverse','fill'],
      11: ['duration','symmetry','softness','width','direction','inverse','fill'],
      12: ['duration','symmetry','softness','width','direction','inverse','fill'],
      13: ['duration','posX','softness','width','direction','inverse','fill'],
      14: ['duration','posY','softness','width','direction','inverse','fill'],
      15: ['duration','posX','softness','width','direction','inverse','fill'],
      16: ['duration','posY','softness','width','direction','inverse','fill'],
      17: ['duration','symmetry','softness','width','direction','inverse','fill'],
      18: ['duration','symmetry','softness','width','direction','inverse','fill']*/
      1:  ['duration','softness','width','direction','inverse','fill'],
      2:  ['duration','softness','width','direction','inverse','fill'],
      3:  ['duration','posX','softness','width','direction','inverse','fill'],
      4:  ['duration','posY','softness','width','direction','inverse','fill'],
      5:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      6:  ['duration','symmetry','posX','posY','softness','width','direction','inverse','fill'],
      7:  ['duration','symmetry','softness','width','direction','inverse','fill'],
      8:  ['duration','symmetry','softness','width','direction','inverse','fill'],
      9:  ['duration','symmetry','softness','width','direction','inverse','fill'],
      10: ['duration','symmetry','softness','width','direction','inverse','fill'],
      11: ['duration','symmetry','softness','width','direction','inverse','fill'],
      12: ['duration','symmetry','softness','width','direction','inverse','fill'],
      13: ['duration','posX','softness','width','direction','inverse','fill'],
      14: ['duration','posY','softness','width','direction','inverse','fill'],
      15: ['duration','posX','softness','width','direction','inverse','fill'],
      16: ['duration','posY','softness','width','direction','inverse','fill'],
      17: ['duration','symmetry','softness','width','direction','inverse','fill'],
      18: ['duration','symmetry','softness','width','direction','inverse','fill']
    };
    const avail = wipeCapabilities[shapeId] || [];
    document.querySelectorAll('.control-group').forEach(group => {
      const ctrl = Array.from(group.classList).find(c => avail.includes(c));
      group.classList.toggle('disabled-control', !ctrl);
    });
  }

  function populateFillOptions(selected) {
    fetch('/inputsList')
      .then(r => r.json())
      .then(list => {
        const sel = document.getElementById('fillSelect');
        sel.innerHTML = list.map(src =>
          `<option value="${src.id}">${src.name}</option>`).join('');
        sel.value = list.some(src => String(src.id) === String(selected)) ? selected : list[0]?.id || '';
      });
  }

  function setFill(sel) {
    sendToAtem('fill', parseInt(sel.value, 10));
  }

  async function loadInitialValues() {
    await loadFrameRate();
    const res = await fetch(`/getWipeSettings?me=${getME()}`);
    const data = await res.json();
    const w = data.wipe;
    if (!w) return;

    highlightShape(w.pattern + 1);
    setAvailableControls(w.pattern + 1);

    const map = {
      symmetry: 'symmetry',
      posX: 'xPosition',
      posY: 'yPosition',
      softness: 'softness',
      width: 'borderWidth'
    };

    Object.keys(map).forEach(k => {
      if (w[map[k]] != null) {
        document.getElementById(k + 'Slider').value = w[map[k]];
        updateDisplay(k);
      }
    });

    if (w.rate != null && FPS > 0) {
      const sec = (w.rate / FPS).toFixed(2);
      document.getElementById('durationSlider').value = sec;
      updateDisplay('duration');
    }

    if (w.fillSource != null) {
      populateFillOptions(w.fillSource);
    }

    document.getElementById('inverseCheckbox').checked = !!w.flipFlop;
    const isRev = !!w.reverseDirection;
    document.getElementById('playBtn').classList.toggle('active-direction', !isRev);
    document.getElementById('reverseBtn').classList.toggle('active-direction', isRev);
  }

  async function pollTransitionState() {
    const me = getME();
    try {
      const res = await fetch(`/state?me=${me}`);
      const state = await res.json();
      const map = { MIX: 0, DIP: 1, WIPE: 2, STING: 4, DVE: 3 };

      document.querySelectorAll('.transition-button').forEach(btn => {
        const style = map[btn.textContent.trim()];
        btn.classList.remove('active-transition', 'blink-transition');
        if (state.inTransition && style === state.activeStyle) {
          btn.classList.add('blink-transition');
        } else if (style === state.currentStyle) {
          btn.classList.add('active-transition');
        }
      });
    } catch (e) {
      console.warn('Erreur polling state:', e);
    }
  }

  window.addEventListener('DOMContentLoaded', async () => {
    const savedME = localStorage.getItem('selectedME');
    if (savedME !== null) {
      document.getElementById('meSelect').value = savedME;
    }

    await loadFrameRate();

    const grid = document.getElementById('shapeGrid');
    for (let i = 1; i <= 18; i++) {
      const btn = document.createElement('button');
      btn.className = 'grid-btn';
      const img = document.createElement('img');
      img.src = `images/shape${i}.jpg`;
      btn.appendChild(img);
      btn.addEventListener('click', () => {
        highlightShape(i);
        setAvailableControls(i);
        sendToAtem('pattern', i - 1).then(() => {
          setTimeout(() => loadInitialValues(), 150);
        });
      });
      grid.appendChild(btn);
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      sendToAtem('direction', 0);
      document.getElementById('playBtn').classList.add('active-direction');
      document.getElementById('reverseBtn').classList.remove('active-direction');
    });

    document.getElementById('reverseBtn').addEventListener('click', () => {
      sendToAtem('direction', 1);
      document.getElementById('reverseBtn').classList.add('active-direction');
      document.getElementById('playBtn').classList.remove('active-direction');
    });

    document.getElementById('inverseCheckbox').addEventListener('change', e =>
      sendToAtem('inverse', e.target.checked ? 'true' : 'false')
    );

    document.getElementById('fillSelect').addEventListener('change', e =>
      setFill(e.target)
    );

    document.getElementById('meSelect').addEventListener('change', e => {
      localStorage.setItem('selectedME', e.target.value);
      loadInitialValues();
    });

    document.querySelectorAll('.transition-button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const styleMap = { MIX: 0, DIP: 1, WIPE: 2, STING: 4, DVE: 3 };
        const style = styleMap[btn.textContent.trim()];
        try {
          const res = await fetch(`/transition/${style}?me=${getME()}`, { method: 'POST' });
          const data = await res.json();
          if (data.success) pollTransitionState();
        } catch (e) {
          console.warn('Erreur transition:', e);
        }
      });
    });

    setInterval(pollTransitionState, 250);
    await loadInitialValues();
  });
</script>




</body>
</html>
